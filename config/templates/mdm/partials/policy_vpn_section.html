<div class="rounded-lg border border-gray-200 bg-white p-5 dark:border-gray-700 dark:bg-gray-800">
    <h3 class="mb-4 text-lg font-semibold text-gray-900 dark:text-white">Always-on VPN</h3>
    <div class="max-w-md space-y-3">
        <div>
            {{ form.vpn_package_name.label_tag }}
            {{ form.vpn_package_name }}
            {{ form.vpn_package_name.errors }}
        </div>
        <div>
            <label class="inline-flex cursor-pointer items-center gap-3"
                   for="{{ form.vpn_lockdown.id_for_label }}">
                <input type="checkbox"
                       name="{{ form.vpn_lockdown.html_name }}"
                       id="{{ form.vpn_lockdown.id_for_label }}"
                       {% if form.vpn_lockdown.value %}checked{% endif %}
                       class="sr-only peer">
                <div class="relative h-5 w-9 rounded-full bg-gray-200 after:absolute after:start-[2px] after:top-[2px] after:h-4 after:w-4 after:rounded-full after:border after:border-gray-300 after:bg-white after:transition-all after:content-[''] peer-checked:bg-blue-600 peer-checked:after:translate-x-full peer-checked:after:border-white peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary-300 rtl:peer-checked:after:-translate-x-full dark:border-gray-600 dark:bg-gray-700 dark:peer-checked:bg-blue-600 dark:peer-focus:ring-primary-800">
                </div>
                <span class="text-sm font-medium text-gray-900 dark:text-white">{{ form.vpn_lockdown.label }}</span>
            </label>
            {{ form.vpn_lockdown.errors }}
            <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                When enabled, network traffic is blocked if the VPN disconnects.
            </p>
        </div>
    </div>
</div>
