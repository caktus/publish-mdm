<div class="rounded-lg border border-gray-200 bg-white p-5 dark:border-gray-700 dark:bg-gray-800">
    <h3 class="mb-4 text-lg font-semibold text-gray-900 dark:text-white">Developer Options</h3>
    <div class="max-w-md">
        <div>
            <label class="mb-1 flex items-center gap-1.5 text-sm font-medium text-gray-700 dark:text-gray-300"
                   for="{{ form.developer_settings.id_for_label }}">
                {{ form.developer_settings.label }}
                <span data-tooltip-target="tooltip-developer-settings"
                      data-tooltip-style="light"
                      class="cursor-help text-gray-500 hover:text-gray-700 dark:text-gray-400">
                    <svg class="inline h-4 w-4"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         stroke-width="2"
                         aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                </span>
            </label>
            <div id="tooltip-developer-settings"
                 role="tooltip"
                 class="tooltip invisible absolute z-10 inline-block max-w-xs rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-gray-900 opacity-0 shadow-xs transition-opacity duration-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                Controls access to the Android Developer Options menu (USB debugging, etc.). Set to
                <em>Allowed</em> only for development devices.
                <div class="tooltip-arrow" data-popper-arrow></div>
            </div>
            {{ form.developer_settings }}
            {{ form.developer_settings.errors }}
        </div>
    </div>
</div>
