{% extends "base.html" %}
{% block content %}
    <div class="max-w-md">
        <div class="rounded-lg border border-red-200 bg-red-50 p-6 dark:border-red-800 dark:bg-red-950">
            <h2 class="mb-2 text-lg font-semibold text-red-800 dark:text-red-300">Revoke Enrollment Token</h2>
            <p class="mb-4 text-sm text-red-700 dark:text-red-400">
                Are you sure you want to revoke the token
                <strong>{{ token }}</strong>?
                Devices cannot enroll using this token after it is revoked.
                This action cannot be undone.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="flex items-center space-x-4">
                    <button type="submit"
                            class="btn btn-outline text-red-600 border-red-400 hover:bg-red-100">
                        Yes, Revoke Token
                    </button>
                    <a href="{% url 'mdm:enrollment-token-detail' request.organization.slug token.pk %}"
                       class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
