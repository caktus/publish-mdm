<div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Developer Options</h3>
    <form hx-post="{% url 'publish_mdm:policy-save-developer' request.organization.slug policy.pk %}"
          hx-target="#section-developer"
          hx-swap="innerHTML">
        {% csrf_token %}
        {{ developer_form.non_field_errors }}
        <div class="max-w-md">
            <div>
                {{ developer_form.developer_settings.label_tag }}
                {{ developer_form.developer_settings }}
                {{ developer_form.developer_settings.errors }}
            </div>
        </div>
        <div class="mt-4 flex items-center gap-4">
            <button type="submit" class="btn btn-outline btn-primary">Save</button>
            {% if saved %}
                <span class="text-sm text-green-600 dark:text-green-400">Saved</span>
            {% endif %}
        </div>
    </form>
</div>
