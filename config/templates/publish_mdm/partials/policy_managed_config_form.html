<form hx-post="{% url 'publish_mdm:policy-save-managed-config' request.organization.slug policy.pk app.pk %}"
      hx-target="#config-form-{{ app.pk }}"
      hx-swap="outerHTML">
    {% csrf_token %}
    <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Managed Configuration JSON
        </label>
        <textarea name="managed_configuration"
                  rows="10"
                  class="w-full font-mono text-sm bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500"
                  placeholder='{"key": "value"}'>{{ app.managed_configuration_str }}</textarea>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
            JSON object. Variable placeholders like <code>{% templatetag openvariable %} variable_name {% templatetag closevariable %}</code> are resolved at push time.
        </p>
    </div>
    {% if error %}
        <p class="mb-2 text-sm text-red-600 dark:text-red-400">{{ error }}</p>
    {% endif %}
    <div class="flex items-center gap-3">
        <button type="submit" class="btn btn-outline btn-primary text-sm">Save</button>
        {% if saved %}
            <span x-data="{ vis: true }"
                  x-init="setTimeout(() => { vis = false }, 2500)"
                  x-show="vis"
                  x-transition:leave="transition-opacity duration-500"
                  x-transition:leave-start="opacity-100"
                  x-transition:leave-end="opacity-0"
                  class="text-sm text-green-600 dark:text-green-400">✓ Saved</span>
        {% endif %}
    </div>
</form>
