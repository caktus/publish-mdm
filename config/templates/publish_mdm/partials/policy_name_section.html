<div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Policy Name</h3>
    <form hx-post="{% url 'publish_mdm:policy-save-name' request.organization.slug policy.pk %}"
          hx-target="#section-name"
          hx-swap="innerHTML">
        {% csrf_token %}
        <div class="flex items-end gap-4">
            <div class="flex-1">
                {{ name_form.name.label_tag }}
                {{ name_form.name }}
                {{ name_form.name.errors }}
            </div>
            <button type="submit" class="btn btn-outline btn-primary">Save</button>
        </div>
        {% if saved %}<p class="mt-2 text-sm text-green-600 dark:text-green-400">Saved</p>{% endif %}
    </form>
</div>
{% if saved %}
    {# OOB: update the page heading to reflect the new policy name without a full reload #}
    <h2 id="page-title-heading"
        hx-swap-oob="true"
        class="mt-3 mb-5 text-xl font-semibold text-gray-900 dark:text-white sm:text-2xl">{{ policy.name }}</h2>
{% endif %}
