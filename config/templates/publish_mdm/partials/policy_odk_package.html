<form hx-post="{% url 'publish_mdm:policy-save-odk-package' request.organization.slug policy.pk %}"
      hx-target="#section-odk-package"
      hx-swap="innerHTML"
      hx-trigger="change, submit">
    {% csrf_token %}
    <div class="flex-1">
        {{ odk_package_form.odk_collect_package }}
        {{ odk_package_form.odk_collect_package.errors }}
    </div>
    <button type="submit" class="sr-only" tabindex="-1">Save</button>
</form>
{% if odk_package_saved %}
    <span x-data="{ vis: true }"
          x-init="setTimeout(() => { vis = false }, 2500)"
          x-show="vis"
          x-transition:leave="transition-opacity duration-500"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          class="mt-1 block text-sm text-green-600 dark:text-green-400">\u2713 Saved</span>
{% endif %}
